name: Publish SDK

on:
  push:
    tags: ['v*']

env:
  PROJECT_ID: verika-490105
  REGION: us-east1
  NPM_REGISTRY: us-east1-npm.pkg.dev/verika-490105/verika-packages

jobs:
  publish:
    name: Publish @internal/verika
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: verika-api@verika-490105.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure npm for Artifact Registry
        run: |
          gcloud artifacts print-settings npm \
            --project=${{ env.PROJECT_ID }} \
            --repository=verika-packages \
            --location=${{ env.REGION }} \
            --scope=@internal \
            >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=@internal/verika-shared

      - name: Build SDK
        run: npm run build --workspace=@internal/verika

      - name: Publish shared types to Artifact Registry
        run: npm publish --workspace=@internal/verika-shared

      - name: Publish SDK to Artifact Registry
        run: npm publish --workspace=@internal/verika

      - name: Notify consuming projects
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          event-type: verika-sdk-published
          client-payload: '{"version": "${{ github.ref_name }}"}'
          repository: ${{ github.repository_owner }}/room404
        continue-on-error: true

      - name: Notify MystWeaver
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          event-type: verika-sdk-published
          client-payload: '{"version": "${{ github.ref_name }}"}'
          repository: ${{ github.repository_owner }}/mystweaver
        continue-on-error: true
